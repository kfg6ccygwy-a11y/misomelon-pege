<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="相生市のメロンとみそでつくる、みそメロン田楽「みそメロ」の紹介ページ。"
    />
    <title>みそメロ | 相生市のメロンとみそでつくる田楽</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index--92hy6I3.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C0fwUFS5.css">
    <style>
      :root {
        --hand-font: "Hannotate SC", "Hannotate TC", "YuKyokasho",
          "Tsukushi A Round Gothic", cursive;
      }

      body {
        position: relative;
        background: #fff8f4;
      }

      :root {
        --site-header-height: 54px;
        --z-page: 0;
        --z-hero-media: 1;
        --z-hero-shade: 2;
        --z-hero-content: 3;
        --z-header: 40;
        --z-modal: 80;
        --z-tooltip: 90;
      }

      main {
        position: relative;
        z-index: var(--z-page);
        padding-top: var(--site-header-height);
      }

      .hero {
        isolation: auto !important;
        margin-top: calc(var(--site-header-height) * -1);
        padding-top: var(--site-header-height);
        overflow: hidden;
      }

      .hero__image {
        z-index: var(--z-hero-media) !important;
      }

      .hero__shade {
        z-index: var(--z-hero-shade) !important;
      }

      .hero__content {
        position: relative;
        z-index: var(--z-hero-content);
      }

      .site-header {
        position: fixed !important;
        top: 0;
        left: 0;
        right: 0;
        z-index: var(--z-header);
        width: 100%;
        min-height: var(--site-header-height);
        background: linear-gradient(90deg, rgba(37, 17, 23, 0.68), rgba(37, 17, 23, 0.34)) !important;
        box-shadow: 0 1px 0 rgba(255, 250, 240, 0.14);
        backdrop-filter: blur(12px);
        font-family: var(--hand-font);
        padding: 10px clamp(24px, 5vw, 72px);
      }

      .site-header .brand {
        font-size: clamp(1.08rem, 1.45vw, 1.34rem);
        font-weight: 500;
      }

      .site-header .site-nav {
        gap: clamp(16px, 2.1vw, 32px);
        font-size: clamp(0.8rem, 0.9vw, 0.94rem);
      }

      html {
        scroll-padding-top: calc(var(--site-header-height) + 26px);
      }

      .intro,
      .taste,
      .serve,
      .closing {
        scroll-margin-top: calc(var(--site-header-height) + 26px) !important;
      }

      .serve {
        padding-top: 96px;
      }

      .serve__list {
        grid-template-columns: 1fr !important;
        gap: 24px;
      }

      .serve article {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) clamp(86px, 11vw, 132px);
        grid-template-areas:
          "num icon"
          "title icon"
          "copy icon";
        column-gap: clamp(18px, 4vw, 56px);
        align-items: center;
        overflow: hidden;
        width: min(100%, 1200px);
        min-height: 220px;
        margin: 0 auto;
        padding: 24px clamp(34px, 5vw, 66px);
      }

      .serve article span {
        grid-area: num;
        margin-bottom: 18px;
      }

      .serve article h3 {
        grid-area: title;
        margin-bottom: 12px;
        font-size: clamp(1.38rem, 2.4vw, 2rem);
      }

      .serve article p {
        grid-area: copy;
        max-width: 840px;
        font-size: clamp(1rem, 1.75vw, 1.28rem);
        line-height: 1.75;
      }

      .local-effect-icon {
        grid-area: icon;
        justify-self: center;
        align-self: start;
        width: clamp(82px, 10vw, 126px);
        height: clamp(82px, 10vw, 126px);
        object-fit: contain;
        opacity: 0.78;
        pointer-events: none;
        transform: translateY(8px);
      }

      @media (max-width: 820px), (hover: none) and (pointer: coarse) {
        :root {
          --hand-font: "Yomogi", "Hannotate SC", "Hannotate TC", "YuKyokasho",
            "Tsukushi A Round Gothic", cursive;
        }
      }

      @media (max-width: 560px) {
        .serve article {
          grid-template-columns: minmax(0, 1fr) 72px;
          min-height: 220px;
          padding: 34px 28px 34px 28px;
        }

        .local-effect-icon {
          width: 72px;
          height: 72px;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const localEffectCards = [
        {
          image: "./assets/local-interest.png",
          alt: "相生市への興味を表すアイコン",
          title: "相生を知るきっかけに",
          copy: "阪神圏でみそメロを見かける接点をつくり、相生市の名前と特産品を覚えてもらいます。",
        },
        {
          image: "./assets/local-phone.png",
          alt: "SNS投稿を表すアイコン",
          title: "投稿したくなる体験に",
          copy: "串、焼き目、つやのあるみそだれで写真に残したくなる見た目にし、SNSで広がりやすくします。",
        },
        {
          image: "./assets/local-trip.png",
          alt: "相生への旅を表すアイコン",
          title: "次の来訪につなげる",
          copy: "神戸や大阪で味を知った人が、次は相生で食べたいと思える流れをつくります。",
        },
      ];

      const applyLocalEffectUpdate = () => {
        const localHeading = document.querySelector(".serve h2");
        const cards = document.querySelectorAll(".serve__list article");
        if (cards.length < localEffectCards.length) return false;

        if (localHeading) {
          localHeading.textContent = "神戸や大阪で出会い、相生を思い出す。";
        }

        cards.forEach((card, index) => {
          const item = localEffectCards[index];
          card.querySelector("h3").textContent = item.title;
          card.querySelector("p").textContent = item.copy;

          if (!card.querySelector(".local-effect-icon")) {
            const icon = document.createElement("img");
            icon.className = "local-effect-icon";
            icon.src = item.image;
            icon.alt = item.alt;
            card.appendChild(icon);
          }
        });

        return true;
      };

      if (!applyLocalEffectUpdate()) {
        const observer = new MutationObserver(() => {
          if (applyLocalEffectUpdate()) observer.disconnect();
        });
        observer.observe(document.getElementById("root"), { childList: true, subtree: true });
      }

      const applyMelonNameUpdate = () => {
        document.querySelectorAll(".note-panel h3").forEach((heading) => {
          if (heading.textContent.includes("相生メロン")) {
            heading.textContent = heading.textContent.replace("相生メロン", "矢野メロン");
          }
        });
      };

      applyMelonNameUpdate();
      new MutationObserver(applyMelonNameUpdate).observe(document.getElementById("root"), {
        childList: true,
        subtree: true,
        characterData: true,
      });
    </script>
  </body>
</html>
